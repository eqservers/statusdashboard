name: Update server status

on:
  workflow_dispatch:
  schedule:
    - cron: '*/15 * * * *'

permissions:
  contents: write

jobs:
  check:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Test ports and update HTML
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ports = @(
            '50001','50002','50003','50004','50005','50006',
            '50007','50008','50009','50010','50011','50012',
            '50013','50014','50015','50016','50017','50018',
            '50019','50020','50021','50022','50023','50024',
            '50025','50026','50027','50028','50029','50030',
            '50031','50032','50033','50034','50035','50036',
            '50037','50038','50039','50040','50041','50042',
            '50043','50044','50045','50047','50048','50049',
            '50050','50051','50052','50053','50054','50057',
            '50058','50059','50060','50061','50062','50063',
            '50064','50066','50067','50068','50069'
          )
          
          $html = Get-Content index.html -Raw

          foreach ($port in $ports) {
            $serverID = "TS" + $port.Substring($port.Length - 2)
            $result   = Test-NetConnection -ComputerName 81.246.93.147 -Port $port -WarningAction SilentlyContinue
            $online   = $result.TcpTestSucceeded

            $dataValue = if ($online) { "True" }   else { "False" }
            $pillClass = if ($online) { "online" }  else { "offline" }
            $pillText  = if ($online) { "Online" }  else { "Offline" }

            $html = $html -replace `
              "<div class=""server-card"" id=""card-$serverID"" data-online=""[^""]*"">.*?</div>", `
              "<div class=""server-card"" id=""card-$serverID"" data-online=""$dataValue""><span class=""server-name"">$serverID</span><span class=""status-pill $pillClass"" id=""status-$serverID""><span class=""pulse""></span>$pillText</span></div>"
          }

          $timestamp = (Get-Date).AddHours(1).ToString('yyyy-MM-dd HH:mm:ss')
          $html = $html -replace '(?<=id="last-updated-time">)[^<]*', $timestamp

          Set-Content index.html -Value $html -Encoding UTF8

      - name: Commit updated HTML
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Status update $(date -u '+%Y-%m-%d %H:%M')"
          git push
